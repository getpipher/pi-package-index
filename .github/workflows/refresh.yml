name: Refresh package data

on:
  schedule:
    # 04:00 UTC daily
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Restore the previous run's data/.cache so a workflow_dispatch retry resumes
      # (same-day cached entries are reused; stale ones refetch via the DAY_TTL).
      - name: Restore enrichment cache
        uses: actions/cache@v4
        with:
          path: data/.cache
          key: refresh-${{ github.run_id }}
          restore-keys: refresh-

      - name: Run pipeline (scheduled run forces a fresh fetch; retries resume from cache)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PI_PKG_GH_PAT: ${{ secrets.PI_PKG_GH_PAT }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then ARGS="--no-cache"; fi
          pnpm pipeline $ARGS

      - name: Commit data on diff (rebase against latest main before pushing)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/packages.json data/packages.min.json)" ]]; then
            git add data/packages.json data/packages.min.json
            git commit -m "data: refresh package index [skip ci]"
            # main may have advanced while this run was executing; rebase data-only commit on top.
            git fetch origin main
            git rebase origin/main
            git push
          else
            echo "No data changes; skipping commit."
          fi